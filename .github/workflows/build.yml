name: Lint, Test & Deploy
on:
    push:
        branches:
            - master

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v3
            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
            - name: Install Dependencies
              run: npm ci
            - name: 🧹 Lint Code
              run: npm lint
            - name: 🧪 Test Code
              run: npm test
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: ⬇️ Checkout Code
              uses: actions/checkout@v3
            - name: 🏗️ Install NodeJS
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
            - name: 🛠️ Build Project
              run: npm run build
            - name: 🚀 Deploy
              run: echo "🚀 Deploying to production server..."
